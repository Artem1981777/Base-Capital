name: Stake Verdicts

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: stake-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  stake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Stake + resolve verdicts on-chain
        env:
          NETWORK_MODE: mainnet
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npx tsx agent/stake.ts
      - name: Commit proof snapshots
        if: always()
        run: |
          git config user.name "stake-bot"
          git config user.email "stake-bot@users.noreply.github.com"
          git add proofs/
          if git diff --cached --quiet; then
            echo "no new proof snapshots"
          else
            git commit -m "chore(proofs): archive snapshots [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
