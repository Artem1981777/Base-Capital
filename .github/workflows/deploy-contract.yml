name: Deploy RiskStake

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type deploy to confirm REAL mainnet deployment'
        required: true
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Write foundry.toml
        run: printf '[profile.default]\nsrc = "contracts"\nout = "out"\nsolc = "0.8.24"\noptimizer = true\noptimizer_runs = 200\n' > foundry.toml
      - name: Build
        run: forge build
      - name: Deploy to Base mainnet
        env:
          DEPLOYER_PRIVATE_KEY: $266
        run: |
          if [ -z "$DEPLOYER_PRIVATE_KEY" ]; then echo "secret DEPLOYER_PRIVATE_KEY not set"; exit 1; fi
          forge create contracts/RiskStake.sol:RiskStake \
            --rpc-url https://mainnet.base.org \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            --constructor-args 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913 0x45e029499424FCc76aFb55b3beE7D16116db0a97 \
            --broadcast --json | tee deploy-out.json
          echo "=== Deployed address ==="
          grep -o '"deployedTo":"[^"]*"' deploy-out.json || true
